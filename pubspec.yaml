name: civic_kiosk_app
description: A civic services kiosk application
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # For document picking
  image_picker: ^1.0.4

  # For webview in payment
  webview_flutter: ^4.4.2

  # For local storage
  shared_preferences: ^2.2.2

  # For secure storage (tokens, sensitive data)
  flutter_secure_storage: ^9.2.2

  # For URL launching
  url_launcher: ^6.2.1

  # For device info
  device_info_plus: ^9.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/icons/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500